# PRSTI 루브릭 — Phase 0 초안
# 상태: draft (사용자 승인 전. area weight/proposed_weight는 전부 null)
# 근거: 최아리 외(2026), 한국회계학회지 35(3), 표6~8
# 이 파일의 항목별 판정기준 서술은 docs/scoring-methodology.md에서 가져온 것이며,
# 그 문서가 "왜 이 기준인가"의 설명을 담고 있다. 이 파일은 기계가 읽는 축약판이다.

rubric_version: "0.1-draft"
status: "draft"
scale_note: >
  0/1/2점 척도는 PRSTI가 새로 설계한 것이며 논문 표10의 ○(1)/△(0.5)/✕(0) 실증채점
  척도를 그대로 이식한 것이 아니다. docs/scoring-methodology.md 상단 참고.

# 2026-07-20 사용자 확정 사항(decision-log.md DEC-002/005/006/007 참고). 배점(weight)은 여전히 미확정.
confirmed_decisions:
  - "영역 구조는 논문 원 카테고리(가/나/다/라+조건부+권장)를 그대로 채택 (DEC-002)"
  - "논문 미출처 3항목(PRS명칭·공시위치·진성매각판단)은 채점 항목에서 제외 유지 (DEC-006)"
  - "조건부 필수항목의 '조건 비해당 명시'는 auto_max(만점) 처리 (DEC-005)"
  - "발행회사 자신의 공시만 근거로 인정, 신용평가사 등 제3자 분석 자료는 불인정 (DEC-007)"

