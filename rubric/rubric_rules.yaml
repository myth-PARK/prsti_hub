# PRSTI 규칙 기반(rule-based) 채점 규칙
#
# rubric.yaml(승인된 배점·정의, v1.0)과 분리된 신규 파일이다 — 이미 승인된 문서를
# 흔들지 않고, 기계가 실행할 수 있는 키워드·패턴·점수조건만 여기에 얹는다.
# item id로 rubric.yaml과 연결된다.
#
# rule_status 3종:
#   confirmed            0~2점 전 구간이 실제 사례(논문 또는 실제 DART 조회)로 뒷받침됨
#   provisional          방향성(주로 0점 패턴)은 확정, 1·2점 경계 중 일부가 아직 실제
#                        사례로 뒷받침되지 않거나 기준 문구 자체를 재검토해야 함
#   insufficient_evidence 1·2점에 해당하는 실제 사례가 논문·실제 DART 조회 어디에도
#                        없음 — score_rules는 0점 조건만 정의하고 1·2점은 비워둔다.
#                        이 상태에서는 규칙 엔진이 임의로 1·2점을 만들어내지 않는다.
#
# source_examples는 전부 실제 원문(논문 인용 또는 2026-07-21 한화솔루션 실 DART
# 조회 결과)에서 그대로 가져온 것이며, 재작성·요약하지 않았다. 회사 고유의 고유명사
# 자체를 판정 조건(positive_keywords/patterns)으로 쓰지 않는다 — 그건 회귀 테스트용
# source_examples에만 남긴다.

rules_version: "0.1-draft"
rule_basis_summary: >
  2026-07-21 조사(§1~§4, plans/parallel-orbiting-axolotl.md)에서 확보한 논문 표6~10·
  표A1~A4·표9(가상)와 _workspace/dart_한화솔루션_2025.json(실제 DART 조회)를 근거로
  작성. 19개 항목 중 9개(47%)는 1·2점 실사례가 논문에도 실제 조회에도 없다 — 이는
  논문의 핵심 논지(핵심 위험 항목일수록 공시가 비어있다)와 정확히 일치하는 결과다.

items:
  # ---------- 가. 기본 거래 정보 ----------
  필수-01:
    rule_status: provisional
    rule_basis:
      - "표10: 10개 기업 전원 ○(계약규모 100% 공시)"
      - "한화솔루션 실 DART(2025 반기보고서, rcept_no 20250814002909): '약정 금액 500,000'(백만원)"
    positive_keywords: ["계약규모", "약정 금액", "거래 규모", "계약 금액"]
    patterns:
      amount_expression: ['[\d,]+\s*(원|억\s*원|백만\s*원|천\s*원)']
      ratio_expression: ['(부채|자본)\s*(총계)?\s*(대비|비율).{0,20}\d+(\.\d+)?\s*%']
    score_rules:
      0:
        conditions: ["amount_expression 매치 없음"]
      1:
        conditions: ["amount_expression 매치 있음", "ratio_expression 매치 없음"]
      2:
        conditions: ["amount_expression 매치 있음", "ratio_expression 매치 있음"]
    source_examples:
      score_1: ["약정 금액 500,000"]  # 한화솔루션 실측 — 부채총계 대비 비율은 이 발췌 구간에 없어 1점 사례로 채택
      score_2: []
    missing_evidence: "부채총계 대비 비율까지 함께 공시된 실제 원문(2점 사례)이 아직 없음"
    needed_examples: "필수-01이 2점으로 채점될 실제 공시 문구 1건"

  필수-02:
    rule_status: provisional
    rule_basis:
      - "표10: 한화솔루션·에코프로=✕, LG화학=△, 나머지 7개=○"
      - "한화솔루션 실 DART: 거래상대방을 '매매수익 지급자/매매수익 수령자'라는 역할명으로만 지칭, 실제 명칭(SPC/금융기관) 없음 — 표10의 ✕ 등급과 정확히 교차검증됨"
    positive_keywords: ["거래상대방", "SPC", "계약당사자", "주관사"]
    negative_keywords: []
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음", "또는 역할명(예: '매매수익 지급자')만 있고 실제 법인명이 없음"]
      1:
        conditions: ["거래상대방 명칭은 있으나 SPC/금융기관 구분이나 발행회사와의 관계 서술이 없음"]
      2:
        conditions: ["거래상대방 명칭 + SPC/금융기관/주관사 구분 + PRS발행회사와의 관계가 모두 명시"]
    source_examples:
      score_0: ["매매수익 지급자는 만기일 내 언제라도 기초자산을 처분할 수 있으며"]  # 한화솔루션 실측 — 역할명뿐, 실명 없음
      score_2: []
    missing_evidence: "실제 법인명이 명시된 2점(또는 1점) 사례 없음"
    needed_examples: "○ 등급 기업(예: SK이노베이션)의 실제 계약당사자 공시 원문"

  필수-03:
    rule_status: confirmed
    rule_basis:
      - "표10: 한화솔루션·SK이노베이션·롯데케미칼·CJ ENM·두산로보틱스·금호건설=○"
      - "한화솔루션 실 DART(2025 반기·분기보고서): '계약일 2025-06-24 만기일 2028-06-26' — 실제 2점 사례로 신규 확보(2026-07-21)"
    positive_keywords: ["만기일", "계약기간"]
    negative_keywords: ["만기 미정", "추후 결정", "추후 협의"]
    patterns:
      date_expression: ['\d{4}[-.]\d{1,2}[-.]\d{1,2}']
      duration_expression: ['\d+\s*년']
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
      1:
        conditions: ["duration_expression만 매치(예: '3년')", "date_expression 없음"]
      2:
        conditions: ["date_expression 매치(구체적 만기 연월일)"]
    exclusion_rules:
      - "negative_keywords가 date_expression과 함께 나오면(예: '만기일은 추후 결정') 0점으로 강제 하향"
    source_examples:
      score_2: ["계약일 2025-06-24 만기일 2028-06-26"]

  필수-04:
    rule_status: provisional
    rule_basis:
      - "표10 전원○이나 scoring-methodology.md 스스로 '실제로는 2점 기준 만족 여부 재확인 필요'라고 명시"
      - "한화솔루션 실 DART: 'Q Energy Solutions SE 보통주 2,784,293주(22.65%), E-PPRs 684,792단위' — 수량·비율은 있으나 '발행가액' 명시 여부 및 비율의 기준(대상회사 지분율 vs 한화솔루션 자기자본 대비 비율)이 불명확"
    positive_keywords: ["기초자산"]
    patterns:
      share_count_expression: ['[\d,]+\s*주']
      ratio_expression: ['\(\d+(\.\d+)?%\)']
      issue_price_keywords: ["발행가액", "발행 가액"]
    score_rules:
      0:
        conditions: ["기초자산이 무엇인지 특정할 수 없음"]
      1:
        conditions: ["종목명(또는 share_count_expression)만 있고 거래형태·비율·발행가액 중 다수가 불명확"]
      2:
        conditions: ["거래 형태 + share_count_expression/ratio_expression + issue_price_keywords 매치가 모두 있음"]
    source_examples:
      score_1: ["Q Energy Solutions SE 보통주 2,784,293주(22.65%), E-PPRs 684,792단위"]
    missing_evidence: "이 실측 문구에 발행가액이 명시돼 있는지, 비율이 논문 정의(한화솔루션 자기자본 대비)와 같은 기준인지 미확인 — 2점 사례로 단정하지 않음"
    needed_examples: "발행가액이 명시적으로 표기된 실제 공시 문구"

  필수-05:
    rule_status: provisional
    rule_basis:
      - "표10 전원○(동일하게 '재확인 필요' 경고 있음)"
      - "한화솔루션 실 DART: '정산기준금액=(매각 완료 기초자산의 총 매각 금액-매각 관련 비용)-매각 완료 기초자산에 해당하는 계약금액' — 공식 기반 차액정산 구조이지, 논문 criteria 문구의 '주당 기준가' 방식이 아님"
    positive_keywords: ["정산", "정산 방법", "정산방식"]
    patterns:
      formula_expression: ['정산\s*(기준)?\s*금액\s*=']
      reference_price_expression: ['주당\s*기준가']
      timing_expression: ["만기 일시", "분기별", "반기별"]
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
      1:
        conditions: ["현금/주식 정산 여부만 언급, formula_expression·reference_price_expression·timing_expression 모두 없음"]
      2:
        conditions: ["(formula_expression 또는 reference_price_expression) 매치 + timing_expression 매치"]
    source_examples:
      score_1_or_2_ambiguous: ["정산기준금액= (매각 완료 기초자산의 총 매각 금액 - 매각 관련 비용) - 매각 완료 기초자산에 해당하는 계약금액"]
    missing_evidence: >
      한화솔루션 실측이 '주당 기준가' 방식이 아닌 공식(formula) 기반이라, criteria 문구를
      그대로 적용하면 2점 요건("주당 기준가")을 충족 못한다고 판정될 위험이 있다. 이는
      criteria 문구가 모든 PRS 구조(주가연동형 vs 공식산정형)를 포괄하지 못할 수 있다는
      뜻이며, 규칙만으로 해결할 문제가 아니라 rubric.yaml의 criteria 문구 자체를 재검토할
      필요가 있다(§4 범위 밖, 별도 사용자 확인 필요).
    needed_examples: "criteria 문구 재검토 후 재분류된 실제 2점 사례"

  필수-06:
    rule_status: insufficient_evidence
    rule_basis:
      - "표10: 두산로보틱스·금호건설만 ○, 나머지 8개=✕"
      - "accepted_example은 표9 가상 사례('그린인베스트먼트')뿐 — 실제 기업 사례 아님"
      - "한화솔루션 실 DART: K-IFRS 조항·회계처리 판단근거 언급 전무 — 표10 ✕ 등급과 교차검증됨"
    positive_keywords: ["K-IFRS", "금융부채로 분류", "회계처리 근거"]
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
    missing_evidence: "1·2점에 해당하는 실제 기업 공시 사례가 논문·실제 DART 조회 모두에서 확보되지 않음(표9는 가상 사례라 제외)"
    needed_examples: "두산로보틱스 또는 금호건설의 실제 DART 조회 결과(현재 미조회)"

  # ---------- 다. 투명성 강화(부외부채) ----------
  필수-07:
    rule_status: insufficient_evidence
    rule_basis:
      - "표10: 10개 기업 전원 ✕(논문도 실제 공시 사례를 찾지 못함)"
      - "한화솔루션 실 DART: 재분류 위험 서술 전무 — 교차검증됨"
    positive_keywords: ["재분류", "차입성으로 재분류", "회계기준 해석 변경"]
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
    missing_evidence: "논문 저자도 실제 공시 사례를 찾지 못한 항목 — 시장 전체에 1·2점 실사례가 없음"
    needed_examples: "재분류 가능성을 구체적으로 서술한 실제 기업 공시 최소 1건(현재 시장에 존재 여부 자체가 불확실)"

  필수-08:
    rule_status: insufficient_evidence
    rule_basis:
      - "표10: 10개 기업 전원 ✕"
      - "유일한 후보(표A3, LG화학 신용평가사 분석)는 발행회사 자신의 공시가 아니라 DEC-007에 따라 근거로 불인정됨"
    positive_keywords: ["부채비율 변화", "재분류 시 영향"]
    patterns:
      pct_point_expression: ['\d+(\.\d+)?\s*%p']
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
    missing_evidence: "발행회사 자신이 공시한 정량 영향액 사례가 없음(표A3는 3자 분석이라 DEC-007로 제외)"
    needed_examples: "발행회사 자신의 공시에 부채비율 변화(%p)가 정량 제시된 실제 사례"

  필수-09:
    rule_status: provisional
    rule_basis:
      - "표10: 두산로보틱스=○, 8개=△, 금호건설=✕"
    positive_keywords: ["신용등급", "부채비율", "이자보상배수"]
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
      1:
        conditions: ["신용등급 또는 재무비율 중 하나만 언급, 또는 자회사 정보만 있음"]
      2:
        conditions: ["PRS발행회사(모회사) 기준 신용등급 + 부채비율 + 이자보상배수가 함께 언급"]
    missing_evidence: "1·2점 실제 quote 미확보(표10 등급만 있고 원문 인용 없음)"
    needed_examples: "두산로보틱스(표10 유일 ○) 실제 DART 조회 결과"

  필수-10:
    rule_status: confirmed
    rule_basis:
      - "표10: 한화솔루션만 ○(10개 중 유일)"
      - "한화솔루션 실 DART: '매매수익 지급자는 만기일 내 언제라도 기초자산을 처분할 수 있으며, 매매수익 수령자(회사)는... 이의 제기 또는 항변권을 행사할 수 없음' — 표10 ○ 등급의 실제 근거를 2026-07-21 신규 확보(논문에는 이 원문 인용이 없었음)"
    positive_keywords: ["셀다운", "재매각", "처분할 수 있"]
    patterns:
      unrestricted_expression: ["언제라도.{0,10}처분", "이의 제기.{0,10}행사할 수 없"]
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음"]
      1:
        conditions: ["셀다운 가능 여부만 언급, 제약 조건(기간·수량) 불명확"]
      2:
        conditions: ["가능 여부(완전가능/조건부가능/불가능) + 제약 조건이 구체적으로 명시 — unrestricted_expression 매치 시 '완전가능'으로 판정"]
    source_examples:
      score_2: ["매매수익 지급자는 만기일 내 언제라도 기초자산을 처분할 수 있으며, 매매수익 수령자(회사)는 매매수익 지급자가 기초자산 처분 시 기초자산 매각과 관련하여 이의 제기 또는 항변권을 행사할 수 없음"]

  필수-11:
    rule_status: insufficient_evidence
    rule_basis:
      - "표10: 10개 기업 전원 ✕(논문도 실제 사례를 찾지 못함)"
      - "한화솔루션 실 DART에 '만기를 1년씩 반복적으로 연장 가능'이라는 조항이 있으나, 이는 만기 연장(maturity extension)이지 콜옵션(조기 정산)과는 다른 개념 — 오분류 위험을 이번 조사에서 확인"
    positive_keywords: ["조기 정산", "콜옵션"]
    exclusion_rules:
      - "'만기를 ... 연장' 표현은 필수-11(콜옵션)의 근거로 채택하지 않는다 — 만기 연장과 조기 정산은 서로 다른 개념이다"
    score_rules:
      0:
        conditions: ["positive_keywords 매치 없음(만기 연장 표현은 매치로 세지 않음)"]
    missing_evidence: "논문 저자도 실제 사례를 찾지 못함 + 한화솔루션에서 발견된 유사 조항(만기연장)은 이 항목의 근거가 될 수 없음을 확인"
